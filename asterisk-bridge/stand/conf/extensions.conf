[globals]
LUNARA_BRIDGE=bridge:8090

; ============= Lunara AudioSocket test extension =============
; Диалплан-контракт с asterisk-bridge:
;   - AudioSocket() возвращается когда мост закрывает соединение (TERM).
;   - Перед закрытием на DTMF-hand-off мост через ARI ставит канал-переменную
;     LUNARA_HANDOFF_TARGET=<номер оператора>.
;   - После AudioSocket() мы переходим в контекст lunara-outcome, который:
;       * если LUNARA_HANDOFF_TARGET задан → Dial() на оператора;
;       * иначе → Hangup().
; Это работает даже если ARI недоступен: мост просто разорвёт AudioSocket
; и Asterisk сам повесит трубку — звонок не залипнет.

[lunara-test]
exten => 9999,1,NoOp(Lunara AudioSocket test)
 same => n,Answer()
 same => n,Set(LUNARA_UUID=${UNIQUEID})
 same => n,MixMonitor(/tmp/${LUNARA_UUID}.wav,ab)
 same => n,AudioSocket(${LUNARA_UUID},${LUNARA_BRIDGE})
 same => n,Goto(lunara-outcome,s,1)

exten => _X.,1,Goto(lunara-test,9999,1)

[lunara-outcome]
exten => s,1,NoOp(Lunara outcome target='${LUNARA_HANDOFF_TARGET}')
 same => n,GotoIf($["${LUNARA_HANDOFF_TARGET}" = ""]?end)
 ; Замените PJSIP/${LUNARA_HANDOFF_TARGET} на ваш trunk (например
 ; PJSIP/${LUNARA_HANDOFF_TARGET}@my-pstn-trunk). g = продолжить диалплан
 ; при разъединении оператора.
 same => n,Dial(PJSIP/${LUNARA_HANDOFF_TARGET},30,g)
 same => n(end),Hangup()
